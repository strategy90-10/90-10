<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ada Project | 日本OSデバッグ宣言</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; border: 1px solid #333; padding: 20px; background: #050505; }
        h1 { color: #f00; font-size: 1.5rem; margin-bottom: 10px; }
        
        /* 復活：アクセスカウンター */
        .counter-section { margin: 20px 0; padding: 10px; border: 1px dashed #444; }
        
        /* 復活：カウントダウンタイマー */
        .timer-section { background: #111; color: #fff; padding: 20px; border-radius: 8px; margin: 20px 0; border: 1px solid #f00; }
        #timer { font-size: 1.5rem; font-weight: bold; color: #f00; }

        .btn { display: inline-block; background: #0f0; color: #000; padding: 15px 25px; text-decoration: none; font-weight: bold; margin: 10px 0; border-radius: 4px; }
        .box { border: 1px solid #333; padding: 15px; margin: 20px 0; }
        .footer { color: #333; font-size: 0.8rem; margin-top: 40px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ 日本OSデバッグ宣言</h1>
    <p>5.5 こどもの日 | 潜伏開始</p>

    <!-- アクセスカウンター -->
    <div class="counter-section">
        <p style="font-size: 0.8rem; color: #888;">🏯 本拠地 延べ訪問者数</p>
        <div style="background: #000; color: #0f0; display: inline-block; padding: 5px 15px; border: 2px solid #333;">
            <!-- ここにFC2等のカウンタータグを貼る。無ければ数字を直接書く -->
            <span>30,628</span>
        </div>
    </div>

    <!-- カウントダウンタイマー -->
    <div class="timer-section">
        <div style="font-size: 0.9rem; color: #aaa; margin-bottom: 10px;">🏁 8.10 有給ボイコットまで</div>
        <div id="timer">計算中...</div>
    </div>

    <div class="box">
        <p>> 映像解析（YouTube直通）</p>
        <a href="https://www.youtube.com/watch?v=Q0H7jPtjG14" class="btn" target="_blank">🎥 映像を再生</a>
    </div>

    <div class="box">
        <p>> 作戦会議室（Googleフォーム直通）</p>
        <!-- ここにGoogleフォームのURLを貼り付ける -->
        <a href="https://docs.google.com/forms/d/e/1FAIpQLScjX_EKlfIybUS-vu07f7uVZz_aPTlAGO9DUwxSWQTBwuUpmg/viewform?usp=publish-editor" class="btn" target="_blank">✉ メッセージ送信</a>
    </div>

    <div class="footer">
        &copy; Ada Project - SYSTEM_RECOVERY_STARTED
    </div>
</div>

<script>
    function updateTimer() {
        const target = new Date('2026-08-10T00:00:00').getTime();
        const now = new Date().getTime();
        const diff = target - now;
        if (diff <= 0) { document.getElementById('timer').innerHTML = "実行中"; return; }
        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        document.getElementById('timer').innerHTML = d + "日 " + h + "時間 " + m + "分 " + s + "秒";
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>
</body>
</html>
