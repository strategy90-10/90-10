<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index of /dev/null</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; line-height: 1.2; overflow-x: hidden; margin: 0; }
        .code-layer { color: #1a1a1a; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; font-size: 11px; overflow: hidden; pointer-events: none; }
        .terminal { max-width: 800px; margin: 0 auto; position: relative; z-index: 1; padding-bottom: 100px; }
        .prompt::before { content: "root@ada_project:~$ "; color: #f00; }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background: #0f0; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
        .msg { margin-bottom: 20px; white-space: pre-wrap; font-size: 1.1rem; }
        /* 動画エリアを安定させる設定 */
        .video-container { position: relative; width: 100%; padding-top: 56.25%; background: #000; border: 1px solid #333; margin: 20px 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .action-area { border-top: 1px dashed #333; margin-top: 40px; padding-top: 20px; }
        iframe.g-form { background: #eee; filter: invert(1) hue-rotate(180deg) brightness(0.9); border: none; }
    </style>
</head>
<body>

<div class="code-layer">
    /* GEOPOLITICS_OS_PATCH_VER_8.10 */
    #include &lt;stdio.h&gt;
    int main() {
        char *target = "SACRIFICE_ONE";
        while(1) { printf("REBUILDING_JAPAN_CORE..."); }
        return 0;
    }
</div>

<div class="terminal">
    <div class="msg" id="output"></div>
    <span id="cursor" class="cursor"></span>

    <div id="content" style="display:none;">
        <div class="prompt">./show_briefing_video</div>
        <p style="color: #ffd700;">📡 潜伏映像：解析完了</p>
        
        <div class="video-container">
            <!-- YouTube公式埋め込み形式 -->
            <iframe src="https://youtube.com" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>

        <div class="action-area">
            <div class="prompt">cat /proc/geopolitics/warning</div>
            <p>[CRITICAL] 9割の庶民のための生存戦略。</p>
            
            <div class="prompt">nc -l 8080 &gt; 作戦会議室</div>
            <!-- GoogleフォームのURLを貼り替えてください -->
            <iframe class="g-form" src="ここにGoogleフォームのURL" width="100%" height="600" frameborder="0">読み込み中…</iframe>
        </div>
    </div>
</div>

<script>
    const text = `> SYSTEM INITIALIZING...
> KERNEL_CHECK: OK
> DECODING_ADA_MESSAGE...
> ........................
> 日本OSデバッグ宣言：実行中`;

    let i = 0;
    const out = document.getElementById('output');
    function type() {
        if (i < text.length) {
            out.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 40);
        } else {
            document.getElementById('cursor').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }
    }
    type();
</script>
</body>
</html>
